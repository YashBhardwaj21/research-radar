
services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: pipeline_postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: pipeline
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: pipeline_redis
    ports:
      - '6379:6379'
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5


  neo4j:
    image: neo4j:5
    container_name: pipeline_neo4j
    environment:
      NEO4J_AUTH: neo4j/password
    ports:
      - '7474:7474'
      - '7687:7687'
    volumes:
      - neo4jdata:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:7474"]
      interval: 10s
      timeout: 10s
      retries: 5

  api:
    build:
      context: .
      dockerfile: docker/Dockerfile.api
    container_name: pipeline_api
    ports:
      - '3000:3000'
    environment:
      - POSTGRES_URL=postgresql://postgres:postgres@postgres:5432/pipeline
      - REDIS_URL=redis://redis:6379/0
      - OLLAMA_BASE_URL=http://host.docker.internal:11434
      - ENVIRONMENT=development
      - LOG_LEVEL=debug
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: ["node", "dist/api/search.js"]

volumes:
  pgdata:
  redisdata:
  neo4jdata:

name: Nightly E2E

on:
  schedule:
    # Run every day at midnight UTC
    - cron: '0 0 * * *'
  workflow_dispatch: # allow manual triggering

jobs:
  e2e:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: pipeline
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/pipeline
      POSTGRES_URL: postgresql://postgres:postgres@localhost:5432/pipeline
      REDIS_URL: redis://localhost:6379/0
      # Nightly E2E will hit live sites, but we still mock Ollama to speed up CI
      OLLAMA_BASE_URL: http://localhost:11434
      CI: true

    steps:
    - uses: actions/checkout@v4

    - name: Use Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20.x'
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Generate Prisma client
      run: npx prisma generate

    - name: Run Prisma migrations
      run: npx prisma migrate deploy

    - name: Seed test database
      run: npm run seed:test

    - name: Build TypeScript
      run: npm run build

    - name: Install Playwright browsers
      run: npx playwright install --with-deps

    - name: Run Playwright E2E tests (Live Sites)
      run: npm run test:e2e
